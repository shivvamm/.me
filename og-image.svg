<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#F4F1E8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- corner mark -->
  <rect x="40" y="40" width="80" height="80" fill="#FF3EA5" stroke="#0A0A0A" stroke-width="4"/>

  <!-- main card -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="1040" height="340" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="5"/>
    <rect x="10" y="10" width="1040" height="340" fill="none" stroke="#0A0A0A" stroke-width="5"/>

    <text x="50" y="120" font-family="Archivo Black, Arial Black, sans-serif" font-size="100" fill="#0A0A0A" letter-spacing="-3">SHIVAM PANDEY</text>
    <text x="50" y="200" font-family="Archivo Black, Arial Black, sans-serif" font-size="56" fill="#0A0A0A">AI Engineer<tspan fill="#FF3EA5"> ·</tspan> Agents<tspan fill="#FF3EA5"> ·</tspan> RAG<tspan fill="#FF3EA5"> ·</tspan> Voice</text>

    <!-- chips -->
    <g font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">
      <rect x="50" y="240" width="180" height="48" fill="#CBFF3E" stroke="#0A0A0A" stroke-width="3"/>
      <text x="140" y="272" text-anchor="middle">91% PRECISION</text>

      <rect x="246" y="240" width="200" height="48" fill="#00E5FF" stroke="#0A0A0A" stroke-width="3"/>
      <text x="346" y="272" text-anchor="middle">9,000+ INDEXED</text>

      <rect x="462" y="240" width="160" height="48" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
      <text x="542" y="272" text-anchor="middle">4×H100 DDP</text>

      <rect x="638" y="240" width="210" height="48" fill="#FF3EA5" stroke="#0A0A0A" stroke-width="3"/>
      <text x="743" y="272" text-anchor="middle" fill="#FFFFFF">PROD · NOT DEMOS</text>
    </g>
  </g>

  <!-- bottom ribbon -->
  <rect x="0" y="560" width="1200" height="70" fill="#0A0A0A"/>
  <text x="80" y="610" font-family="Archivo Black, Arial Black, sans-serif" font-size="36" fill="#CBFF3E">★ PORTFOLIO · 2026 ·</text>
  <text x="560" y="610" font-family="Archivo Black, Arial Black, sans-serif" font-size="36" fill="#F4F1E8">shivvamm</text>
</svg>
